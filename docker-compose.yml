services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      API_DATA_DIR: /data
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    volumes:
      - ./docker-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  scanner:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles:
      - scanner
    env_file:
      - .env
    environment:
      API_DATA_DIR: /data
    volumes:
      - ./docker-data:/data
    command:
      - python
      - scripts/scan_and_export.py
      - --folder
      - /data/incoming
      - --recursive
      - --vlm-provider
      - openai
      - --vlm-model
      - gpt-5.5
